name: 暖橙
description: 活力大胆的风格，适合自媒体、创业类账号

variables:
  primary-color: "#EF7060"
  bg-accent-color: "#fff9f9"

styles:
  h1: "font-size:22px; font-weight:bold; color:{primary-color}; text-align:center; border-bottom:2px solid {primary-color}; padding-bottom:10px; margin-bottom:24px;"
  h2: "font-size:17px; font-weight:bold; color:#fff; background:{primary-color}; padding:4px 12px 2px; border-top-left-radius:3px; border-top-right-radius:3px; display:inline-block; margin:2em 0 0; border-bottom:2px solid #efebe9;"
  h3: "font-size:16px; font-weight:bold; color:{primary-color}; margin:1.5em 0 0.8em;"
  h4: "font-size:15px; font-weight:bold; color:#c0392b; margin:1.2em 0 0.6em;"
  p: "font-size:16px; line-height:1.8; color:#3e3e3e; margin:10px 0;"
  strong: "color:{primary-color}; font-weight:bold;"
  em: "font-style:italic; color:#555;"
  a: "color:{primary-color}; text-decoration:none; border-bottom:1px solid {primary-color};"
  blockquote: "border-left-color:{primary-color}; background:{bg-accent-color}; padding:12px 16px; margin:1.2em 0; color:#555; border-left-width:4px; border-left-style:solid;"
  ul: "padding-left:20px; margin:0.6em 0;"
  ol: "padding-left:20px; margin:0.6em 0;"
  li: "margin-bottom:6px; line-height:1.75; color:#3e3e3e;"
  hr: "border:none; height:3px; background:{primary-color}; width:40px; margin:2em 0; border-radius:2px;"
  img: "max-width:100%; border-radius:5px; display:block; margin:15px auto;"
  figcaption: "text-align:center; font-size:12px; color:#999; margin-top:4px;"
  code: "color:#e96900; background:#f3f3f3; padding:2px 6px; border-radius:4px; font-size:90%;"
  pre: "background:#1C1917; color:#FDBA74; padding:16px; border-radius:10px; font-size:13px; line-height:1.8; overflow-x:auto; box-shadow:0 8px 24px rgba(0,0,0,0.2);"
  strong-color: "{primary-color}"
